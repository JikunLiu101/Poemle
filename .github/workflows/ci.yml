# Runs the test suite + production build on every push and PR.
# On a push to master, also uploads dist/ and deploys it to GitHub Pages.
#
# Before this works on a fresh repo: in Settings → Pages, set
# "Build and deployment / Source" to "GitHub Actions". No branch
# configuration is needed — the deploy job below publishes the artifact
# directly.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time. Newer builds wait for older
# ones rather than cancelling, so a hot-fix push always lands.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-and-build:
    name: Test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Production build
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
